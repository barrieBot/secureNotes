name: Backend Pipeline

run-name: ${{github.actor}} pushed backend changes to main

on:
  push:
    branches: [main, production]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  snyk:
    name: Linting| Snyk - Dependency Scan
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: backend
    permissions:
      contents: read
      security-events: write # required to upload SARIF to the Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependecies
        run: npm ci

      - name: Snyk - Scan open-source dependencies
        id: snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --severity-threshold=high
            --sarif-file-output=backend/snyk.sarif
            --file=backend/package.json

      - name: Upload Snyk SARIF To Github Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: backend/snyk.sarif

      - name: Fail Pipeline on high/critical vulnerabilities found
        if: steps.snyk.outcome == 'failure'
        run: |
          echo "::error::Snyk found high or critical severity vulnerabilities."
          echo "::error::Check the Security tab for details and fix before merging"
          exit 1

  sonarqube:
    name: Linting| SonarQube - Static Analysis
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependecies
        run: npm ci

      - name: SonarQube scan
        run: npm run sonar:scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: backend/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  unit-test:
    name: Test| Run Unit Tests
    needs: [snyk, sonarqube]
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install Dependecies
        run: npm ci

      - name: Execute Unit Tests
        run: npm run test

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: backend/coverage/
          retention-days: 14

  build:
    name: Build| Docker image
    needs: [unit-test]
    runs-on: [self-hosted, Linux]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        run: |
          docker build \
            --target=live \
            -t fedil/securenotes-backend:sha-${{ github.sha }} \
            -t fedil/securenotes-backend:main \
            -t fedil/securenotes-backend:latest \
            .

      - name: Push Docker Image
        run: |
          docker push fedil/securenotes-backend:sha-${{ github.sha }}
          docker push fedil/securenotes-backend:main
          docker push fedil/securenotes-backend:latest
