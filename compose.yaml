services:
  redis:
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    env_file:
      - .env
    volumes:
      - redis-data:/data

  api-0:
    image: ${IMAGE_REPO}/securenotes-backend:${API_VERSION_0}
    depends_on:
      - redis
    env_file:
      - .env


  api-1:
    image: ${IMAGE_REPO}/securenotes-backend:${API_VERSION_1}
    depends_on:
      - redis
    env_file:
      - .env
    
  frontend-0:
    image: ${IMAGE_REPO}/securenotes-frontend:${FRONTEND_VERSION_0}
    env_file:
      - .env
    
  
  frontend-1:
    image: ${IMAGE_REPO}/securenotes-frontend:${FRONTEND_VERSION_1}
    env_file:
      - .env
    
  nginx:
    image: nginx:1.27.4-perl
    ports:
      - 80:80
      - 81:81
    depends_on:
      - api-0
      - api-1
      - frontend-0
      - frontend-1
    env_file:
      - .env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'


volumes:
  redis-data: