# network
bind 0.0.0.0
port 6379
protected-mode no

# acl
aclfile /usr/local/etc/redis/users.acl

# persistence
save 900 1
save 300 10
save 60 10000
dir /data
dbfilename dump.rdb

# memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# logging
loglevel notice
logfile ""

# disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""